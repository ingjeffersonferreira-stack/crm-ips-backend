spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:crm_ips}
    username: ${DB_USER:crm_user}
    password: ${DB_PASS:changeme}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET}
  expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

admin:
  email: ${ADMIN_EMAIL:admin@sainsa.com}
  password: ${ADMIN_PASSWORD:changeme}
  name: ${ADMIN_NAME:Administrador}

push:
  vapid:
    public-key: ${VAPID_PUBLIC_KEY:BO4xW2BKTPQyEVDuuR_-1XhRE7wcM05Eju-CMWZzU5TkBeULoZXDGLTNM6srOaCrOOMjL9lOVqhOuTt4nRSkAhg}
    private-key: ${VAPID_PRIVATE_KEY:changeme}
    subject: ${VAPID_SUBJECT:mailto:admin@sainsa.com}